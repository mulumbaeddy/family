<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - OBUNANGWE BULAIIRE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f4f8, #f0e6d6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #01605a;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #ff862d, #01605a);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
        }
        
        .offline-features {
            margin-top: 30px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        
        .offline-features h3 {
            color: #01605a;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .offline-features ul {
            list-style: none;
            font-size: 12px;
            color: #666;
        }
        
        .offline-features li {
            padding: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .offline-features li i {
            color: #27ae60;
            width: 20px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again.</p>
        <button class="retry-btn" onclick="location.reload()">
            <i class="fas fa-sync-alt"></i> Retry Connection
        </button>
        
        <div class="offline-features">
            <h3><i class="fas fa-info-circle"></i> Offline Features Available:</h3>
            <ul>
                <li><i class="fas fa-check"></i> View cached activities</li>
                <li><i class="fas fa-check"></i> View cached members</li>
                <li><i class="fas fa-check"></i> Record payments (sync when online)</li>
                <li><i class="fas fa-check"></i> Access contacts</li>
            </ul>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
